name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway when configured
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is not configured; skipping Railway deploy."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service duddy-backend

      - name: Deploy to Fly.io when configured
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not configured; skipping Fly.io deploy."
            exit 0
          fi
          curl -L https://fly.io/install.sh | sh
          ~/.fly/bin/flyctl deploy --remote-only
