name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.12"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Create dummy local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "DUDDY_BACKEND_URL=http://10.0.2.2:8010" >> local.properties
          echo "SUPABASE_URL=https://placeholder.supabase.co" >> local.properties
          echo "SUPABASE_ANON_KEY=placeholder" >> local.properties
      - name: Run lint
        run: ./gradlew lint --no-daemon
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  android-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Create dummy local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "DUDDY_BACKEND_URL=http://10.0.2.2:8010" >> local.properties
          echo "SUPABASE_URL=https://placeholder.supabase.co" >> local.properties
          echo "SUPABASE_ANON_KEY=placeholder" >> local.properties
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

  build-release:
    needs: [backend-tests, android-lint, android-unit-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Create production local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "DUDDY_BACKEND_URL=${{ secrets.PRODUCTION_BACKEND_URL }}" >> local.properties
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
